<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password — UrCostome Edit</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --rose: #e8776a; --rose-d: #d4564a;
    --cream: #fdf6f0; --brown: #5c3d2e;
    --text: #2a1a12; --muted: #9e8070; --border: #e8d8cc;
  }
  body {
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    background: radial-gradient(ellipse 60% 50% at 30% 40%, rgba(232,119,106,.15), transparent 60%), var(--cream);
    font-family: 'DM Sans', sans-serif; color: var(--text);
  }
  .card {
    width: 100%; max-width: 420px; margin: 20px;
    background: #fff; border-radius: 20px;
    box-shadow: 0 20px 60px rgba(92,61,46,.12);
    padding: 48px 40px;
  }
  .logo { text-align: center; margin-bottom: 32px; }
  .logo img { width: 48px; border-radius: 10px; }
  h1 { font-family: 'Playfair Display', serif; font-size: 1.7rem; color: var(--brown); margin-bottom: 8px; }
  p { font-size: .88rem; color: var(--muted); margin-bottom: 28px; }
  label { display: block; font-size: .8rem; font-weight: 600; color: var(--brown); margin-bottom: 6px; text-transform: uppercase; letter-spacing: .02em; }
  .form-group { margin-bottom: 18px; }
  .input-wrap { position: relative; }
  input[type=password], input[type=text] {
    width: 100%; padding: 12px 44px 12px 16px;
    border: 1.5px solid var(--border); border-radius: 10px;
    font-size: .92rem; font-family: 'DM Sans', sans-serif; color: var(--text);
    outline: none; transition: border-color .2s, box-shadow .2s;
  }
  input:focus { border-color: var(--rose); box-shadow: 0 0 0 3px rgba(232,119,106,.12); }
  .eye-toggle {
    position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
    background: none; border: none; cursor: pointer; color: var(--muted); font-size: 1rem;
  }
  button[type=submit] {
    width: 100%; padding: 14px;
    background: linear-gradient(135deg, var(--rose), var(--rose-d));
    color: #fff; border: none; border-radius: 10px;
    font-family: 'DM Sans', sans-serif; font-size: .95rem; font-weight: 600;
    cursor: pointer; box-shadow: 0 4px 16px rgba(232,119,106,.35);
    transition: transform .2s, box-shadow .2s;
  }
  button[type=submit]:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(232,119,106,.4); }
  .flash { padding: 12px 16px; border-radius: 10px; font-size: .88rem; margin-bottom: 16px; }
  .flash.error { background: #fff1f2; color: #9f1239; border: 1px solid #fecdd3; }
</style>
</head>
<body>
<div class="card">
  <div class="logo"><img src="/static/images/logo.png" alt="logo"></div>
  {% with messages = get_flashed_messages(with_categories=true) %}
  {% if messages %}{% for cat, msg in messages %}
  <div class="flash {{ cat }}">{{ msg }}</div>
  {% endfor %}{% endif %}{% endwith %}
  <h1>New password ✦</h1>
  <p>Choose a strong password for your account.</p>
  <form method="POST">
    <div class="form-group">
      <label>New Password</label>
      <div class="input-wrap">
        <input type="password" name="password" id="p1" placeholder="Min. 6 characters" required>
        <button type="button" class="eye-toggle" onclick="t('p1',this)">👁</button>
      </div>
    </div>
    <div class="form-group">
      <label>Confirm Password</label>
      <div class="input-wrap">
        <input type="password" name="confirm_password" id="p2" placeholder="Repeat password" required>
        <button type="button" class="eye-toggle" onclick="t('p2',this)">👁</button>
      </div>
    </div>
    <button type="submit">Set New Password →</button>
  </form>
</div>
<script>
  function t(id,btn){const e=document.getElementById(id);e.type=e.type==='password'?'text':'password';btn.textContent=e.type==='text'?'🙈':'👁';}
</script>
</body>
</html>
